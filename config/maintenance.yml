# Maintenance configuration for ChIP-Atlas
#
# Set current_maintenance to a key name under maintenance_windows to activate,
# or null for normal operation.
#
# Each maintenance window defines phases with:
#   - phase: phase number (1 = full outage, 2 = partial outage, 3 = recovery)
#   - start/end: ISO 8601 timestamps with timezone
#   - announcement: text shown on the top page (red banner)
#   - ea_endpoint: (optional) temporary EA server hostname for phase 2

current_maintenance: null

maintenance_windows:
  nig_2026_spring:
    description: "NIG campus power maintenance (Spring 2026)"
    phases:
      - phase: 1
        start: "2026-04-10T21:00:00+09:00"
        end: "2026-04-12T18:00:00+09:00"
        announcement: "All ChIP-Atlas services are temporarily unavailable due to campus power maintenance"
      - phase: 2
        start: "2026-04-12T18:00:00+09:00"
        end: "2026-04-17T09:00:00+09:00"
        announcement: "Enrichment Analysis and Diff Analysis are temporarily unavailable due to NIG supercomputer maintenance"
        ea_endpoint: "ea.chip-atlas.org"
      - phase: 3
        start: "2026-04-17T09:00:00+09:00"
