upstream puma {
    server 127.0.0.1:9292 fail_timeout=0;
}

server {
    listen 80;
    server_name chip-atlas.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chip-atlas.org;

    # SSL certificates — update paths for your setup
    ssl_certificate     /etc/letsencrypt/live/chip-atlas.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chip-atlas.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /home/ubuntu/chip-atlas/public;

    client_max_body_size 16m;

    # Static assets served directly by nginx
    location ^~ /js/ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
        try_files $uri @app;
    }

    location ^~ /css/ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
        try_files $uri @app;
    }

    location ^~ /images/ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri @app;
    }

    location ^~ /webfonts/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    location ^~ /favicon.ico {
        expires 7d;
        try_files $uri =404;
    }

    # Health check endpoint — fast timeout for ALB
    location = /health {
        proxy_pass http://puma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    # Default app proxy
    location @app {
        proxy_pass http://puma;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        try_files $uri @app;
    }
}
